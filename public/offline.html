<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Servora</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #111827; color: #f3f4f6;
            padding: 1.5rem;
        }
        .card {
            max-width: 420px; width: 100%;
            background: #1f2937; border: 1px solid #374151; border-radius: 12px;
            padding: 1.75rem; text-align: center;
        }
        h1 { font-size: 1.125rem; margin: 0 0 0.5rem; color: #fff; }
        p { color: #9ca3af; font-size: 0.875rem; line-height: 1.5; margin: 0 0 1rem; }
        button {
            padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500;
            color: #fff; background: #4f46e5; border: 0; border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #4338ca; }
        .icon { font-size: 2.25rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>You're offline</h1>
        <p>Servora needs an internet connection to load this page. Check your network and try again.</p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
