name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 206.189.155.9
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/servora
            git fetch "https://zestmy:${{ secrets.GH_PAT }}@github.com/zestmy/Servora.git" main
            git reset --hard FETCH_HEAD
            bash deploy/update.sh
