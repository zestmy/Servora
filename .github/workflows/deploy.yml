name: Deploy to Production

on:
  push:
    branches:
      - main

# Queue deploys instead of running them concurrently; a second push while one
# is deploying waits for it to finish (server-side flock is the backstop).
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 206.189.155.9
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/servora
            # Take the deploy lock before touching git so a concurrent manual
            # deploy can't collide on .git/index.lock. update.sh skips its own
            # lock acquisition when SERVORA_DEPLOY_LOCK_HELD is set (the fd is
            # inherited, so the lock stays held for the whole run).
            exec 9>/var/lock/servora-deploy.lock
            flock -w 600 9
            # Fetch first so the update.sh that runs is the newly pushed one.
            git fetch https://github.com/zestmy/Servora.git main
            git reset --hard FETCH_HEAD
            SERVORA_DEPLOY_LOCK_HELD=1 bash deploy/update.sh
