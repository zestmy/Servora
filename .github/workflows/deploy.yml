name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 206.189.155.9
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/servora

            echo "=== BEFORE RESET ==="
            git log --oneline -3
            echo "--- app.blade.php scan z-report check ---"
            grep -c "Scan Z-Report" resources/views/layouts/app.blade.php || echo "NOT FOUND"

            echo "=== FETCHING ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== AFTER RESET ==="
            git log --oneline -3
            echo "--- app.blade.php scan z-report check ---"
            grep -c "Scan Z-Report" resources/views/layouts/app.blade.php || echo "NOT FOUND"

            echo "=== RUNNING DEPLOY ==="
            bash deploy/update.sh
